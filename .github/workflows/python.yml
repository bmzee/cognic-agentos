name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6  # Node 24 — checkout@v4 was Node 20 (deprecated)

      - name: Install uv
        uses: astral-sh/setup-uv@v7  # Node 24 — setup-uv@v5 was Node 20 (deprecated)
        with:
          version: "0.5.29"
          enable-cache: true

      - name: Read .python-version
        id: python-version
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6  # Node 24 — setup-python@v5 was Node 20 (deprecated)
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: uv sync (frozen — consumes uv.lock, never resolves latest)
        run: uv sync --frozen --all-extras

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy (strict)
        run: uv run mypy src tests

      - name: pytest (with branch + JSON coverage report)
        # Branch coverage + JSON output feed the per-file critical-
        # controls gate below. The default suite excludes the
        # @pytest.mark.postgres and @pytest.mark.oracle live-DB tests
        # — those run in their own jobs against compose services.
        run: |
          uv run pytest -v \
            --cov=cognic_agentos \
            --cov-branch \
            --cov-report=json \
            --cov-report=term-missing \
            -m "not postgres and not oracle"

      - name: Per-file critical-controls coverage gate (≥95% line / ≥90% branch)
        # Sprint 2 amendment in PR #5: each critical-controls module
        # (core/audit, core/canonical, core/chain_verifier,
        # core/decision_history) must independently meet the
        # threshold. A combined --cov-fail-under check would let one
        # well-covered file mask another below the floor; the per-file
        # gate ensures no critical module silently drops.
        run: uv run python tools/check_critical_coverage.py

  a2a-spec-drift:
    # Sprint 6 T6 — env-gated upstream A2A schema-drift gate per
    # Doctrine Decision C. The lane runs after the main `ci` job so a
    # syntax / type regression doesn't trigger a network probe; it
    # fetches the canonical A2A 1.0 protobuf source from the pinned
    # ``v1.0.0`` git tag (NOT main) and SHA-256s it against the
    # digest pinned in ``protocol/a2a_schema.py``. Mismatch fails the
    # build and a deliberate review + version-bump pass is required
    # (per Sprint-6 Decision Lock #1 — silent upgrades forbidden).
    #
    # Setup chain (checkout → uv → python → uv sync) is copied
    # verbatim from the main `ci` job above; if a future PR bumps
    # action versions in `ci`, this lane bumps in lockstep.
    name: a2a-spec drift detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci  # gate on lint+test+coverage passing first
    env:
      COGNIC_RUN_A2A_UPSTREAM: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.29"
          enable-cache: true

      - name: Read .python-version
        id: python-version
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: uv sync (frozen)
        run: uv sync --frozen --all-extras

      - name: Run A2A schema-drift gate
        run: uv run pytest -v -m a2a_upstream tests/unit/protocol/test_a2a_schema_drift.py

  image-size-budget:
    # Sprint 1C: image is split. Kernel ≤120 MiB; default-adapters ≤220 MiB.
    # Both budgets are gated here. The kernel image is what most banks
    # deploy when running plugin-pack adapters; the default-adapters
    # image bundles Postgres/Qdrant/Vault/Ollama/Langfuse-OTel for banks
    # using the Cognic-bundled driver set.
    #
    # NOTE: BUILD_PLAN.md Sprint 1C planning ceiling for default-adapters
    # was 180 MiB. Measured reality after T15 was ~200 MiB — driven by
    # numpy (~50 MiB transitive of qdrant-client + pgvector) + grpc
    # (~18 MiB transitive of qdrant-client) + cryptography (~13 MiB).
    # None of those have removable bloat (compiled libraries). 220 MiB
    # gives ~10% headroom over measured. Bump flagged for review at the
    # Sprint 1C READY-FOR-GATE checkpoint; doctrine update to BUILD_PLAN
    # follows if the bump is accepted.
    name: image size budget (kernel ≤120 / default-adapters ≤370 MiB)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4  # Node 24 — v3 was Node 20 (deprecated)

      - name: Build kernel image
        run: |
          docker build \
            -f infra/agentos/Dockerfile \
            --target runtime \
            --build-arg BUILD_SHA=${{ github.sha }} \
            --build-arg PACKAGE_VERSION=ci \
            -t cognic-agentos:kernel-ci \
            .

      - name: Enforce kernel image budget (≤120 MiB)
        run: |
          set -euo pipefail
          BUDGET_MIB=120
          size_bytes=$(docker image inspect cognic-agentos:kernel-ci --format='{{.Size}}')
          size_mib=$(( size_bytes / 1024 / 1024 ))
          echo "Kernel image size: ${size_mib} MiB (budget ${BUDGET_MIB} MiB)"
          if [ "${size_mib}" -gt "${BUDGET_MIB}" ]; then
            echo "::error::Kernel image ${size_mib} MiB exceeds ${BUDGET_MIB} MiB budget. \
          Adapter Python packages must NOT be in [project] dependencies; check \
          [project.optional-dependencies].adapters."
            exit 1
          fi
          echo "::notice::Kernel image ${size_mib} MiB is within ${BUDGET_MIB} MiB budget"

      - name: Boot smoke — kernel image
        # Production-grade gate: image size + lint + tests pass, but
        # none of those prove the image actually starts and serves a
        # response. Run the built kernel image, poll /api/v1/healthz,
        # confirm 200, then stop. Catches uvicorn-factory typos, missing
        # runtime deps, broken CMD interpolation, and PID-1 signal
        # plumbing regressions in one cheap step.
        run: |
          set -euo pipefail
          docker run -d --name cognic-kernel-smoke \
            -p 8000:8000 \
            cognic-agentos:kernel-ci
          # Poll up to 30s for the server to bind.
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 http://127.0.0.1:8000/api/v1/healthz \
                 -o /tmp/healthz.json 2>/dev/null; then
              ok=1
              break
            fi
            sleep 1
          done
          if [ "${ok}" -ne 1 ]; then
            echo "::error::Kernel image failed to serve /api/v1/healthz within 30s"
            docker logs cognic-kernel-smoke || true
            docker rm -f cognic-kernel-smoke || true
            exit 1
          fi
          echo "::notice::Kernel image booted and served /api/v1/healthz:"
          cat /tmp/healthz.json
          echo
          # Tear down so the next step can claim port 8000 if it wants.
          docker stop cognic-kernel-smoke
          docker rm cognic-kernel-smoke

      - name: Build default-adapters image
        run: |
          docker build \
            -f infra/agentos/Dockerfile \
            --target default-adapters \
            --build-arg BUILD_SHA=${{ github.sha }} \
            --build-arg PACKAGE_VERSION=ci \
            -t cognic-agentos:adapters-ci \
            .

      - name: Enforce default-adapters image budget (≤370 MiB)
        run: |
          set -euo pipefail
          # Budget revised from 220 → 370 MiB in Sprint-4 T13-followup:
          # T13 added pinned cosign v3.0.6 + OPA v1.16.1 (Go binaries) to
          # the default-adapters image per ADR-016. Both binaries ship at
          # upstream-shipped size because alpine's binutils does not
          # recognise their ELF layout (PIE + Go-specific sections), so
          # `strip --strip-unneeded` fails on each. Forcing alternative
          # stripping/compression tooling would add a build-time
          # dependency for a marginal win; budget set to measured reality
          # (~356-359 MiB) plus a small buffer. Kernel ≤120 MiB unchanged.
          BUDGET_MIB=370
          size_bytes=$(docker image inspect cognic-agentos:adapters-ci --format='{{.Size}}')
          size_mib=$(( size_bytes / 1024 / 1024 ))
          echo "default-adapters image size: ${size_mib} MiB (budget ${BUDGET_MIB} MiB)"
          if [ "${size_mib}" -gt "${BUDGET_MIB}" ]; then
            echo "::error::default-adapters image ${size_mib} MiB exceeds ${BUDGET_MIB} MiB \
          budget. Trim adapter deps or revisit the budget in BUILD_PLAN.md."
            exit 1
          fi
          echo "::notice::default-adapters image ${size_mib} MiB is within ${BUDGET_MIB} MiB budget"

      - name: Verify pinned cosign + OPA binaries on PATH (Sprint-4 T13)
        run: |
          set -euo pipefail
          # Trust gate (T6) calls cosign via subprocess; policy engine
          # (T2) calls opa via subprocess. Both binaries are fetched +
          # sha256-verified in the default-adapters-builder stage and
          # COPY'd into the runtime stage. This step proves they end up
          # on PATH inside the runtime image AND are executable as the
          # non-root cognic UID 10001 — which is what the trust gate +
          # policy engine actually invoke.
          docker run --rm cognic-agentos:adapters-ci sh -c '
            set -e
            command -v cosign >/dev/null || { echo "cosign missing on PATH" >&2; exit 1; }
            command -v opa    >/dev/null || { echo "opa missing on PATH"    >&2; exit 1; }
            cosign version
            opa version
          '
          echo "::notice::default-adapters image carries pinned cosign + OPA on PATH"

  oracle-integration:
    # Sprint 1D: live Oracle XE compose overlay + pytest -m oracle. Runs
    # on PR + main; failure blocks merge. Default `lint + test` job runs
    # all tests but the @pytest.mark.oracle integration class self-skips
    # via `skipif(not COGNIC_RUN_ORACLE_INTEGRATION)` — this job is the
    # only place those tests execute.
    name: oracle integration (live XE overlay)
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Oracle XE first-boot is slow

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.29"
          enable-cache: true

      - name: Read .python-version
        id: python-version
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: uv sync (frozen + all extras)
        run: uv sync --frozen --all-extras

      - name: Bring up Oracle XE overlay
        run: |
          docker compose -f infra/dev/docker-compose.yml \
                         -f infra/dev/docker-compose.oracle.yml \
                         up -d oracle

      - name: Wait for Oracle XE healthy
        run: |
          set -euo pipefail
          # First-boot can take ~3-5 minutes; gvenzl healthcheck reports
          # healthy as soon as SQL*Plus accepts connections.
          for i in $(seq 1 60); do
            status=$(docker inspect cognic-agentos-oracle --format='{{.State.Health.Status}}')
            echo "[${i}/60] oracle health: ${status}"
            if [ "${status}" = "healthy" ]; then exit 0; fi
            sleep 10
          done
          echo "::error::Oracle XE did not reach healthy state in 10 minutes"
          docker compose -f infra/dev/docker-compose.yml \
                         -f infra/dev/docker-compose.oracle.yml logs oracle
          exit 1

      - name: Apply governance migrations + provision runtime role
        # Sprint 2 Task 12: same setup as the postgres-integration job —
        # apply the migration as the schema owner, then provision
        # agentos_runtime + GRANTs + cross-schema synonyms (Path A.1
        # from the operator runbook, since CI uses SYSTEM which holds
        # CREATE ANY SYNONYM).
        env:
          COGNIC_DATABASE_URL: oracle+oracledb://cognic:cognic_dev_only@localhost:1521/?service_name=XEPDB1
        run: |
          set -euo pipefail
          # 1. Apply the governance migration as cognic (schema owner).
          uv run alembic upgrade head
          # 2. Provision agentos_runtime (via SYSTEM) + apply GRANTs
          #    from cognic + create cross-schema synonyms (via SYSTEM,
          #    using CREATE ANY SYNONYM). Mirrors operator-runbook
          #    Step 2 + Step 3 + Step 3.5 / Path A.1.
          docker exec -i cognic-agentos-oracle \
            sqlplus -S 'system/cognic_dev_only@//localhost:1521/XEPDB1' <<'SQL'
          WHENEVER SQLERROR EXIT SQL.SQLCODE
          CREATE USER agentos_runtime IDENTIFIED BY "runtime_dev_only";
          GRANT CREATE SESSION TO agentos_runtime;
          CREATE OR REPLACE SYNONYM agentos_runtime.audit_event             FOR cognic.audit_event;
          CREATE OR REPLACE SYNONYM agentos_runtime.decision_history        FOR cognic.decision_history;
          CREATE OR REPLACE SYNONYM agentos_runtime.governance_chain_heads  FOR cognic.governance_chain_heads;
          EXIT;
          SQL
          docker exec -i cognic-agentos-oracle \
            sqlplus -S 'cognic/cognic_dev_only@//localhost:1521/XEPDB1' <<'SQL'
          WHENEVER SQLERROR EXIT SQL.SQLCODE
          GRANT INSERT, SELECT          ON audit_event             TO agentos_runtime;
          GRANT INSERT, SELECT          ON decision_history        TO agentos_runtime;
          GRANT INSERT, SELECT, UPDATE  ON governance_chain_heads  TO agentos_runtime;
          EXIT;
          SQL

      - name: Run @pytest.mark.oracle tests (canary + concurrent first)
        # Run runtime-role canary + concurrent-append tests BEFORE
        # the alembic round-trip (which drops + recreates the tables,
        # discarding the GRANTs + synonyms). Same ordering rationale
        # as the postgres-integration job.
        env:
          COGNIC_RUN_ORACLE_INTEGRATION: "1"
          COGNIC_DB_DRIVER: oracle
          COGNIC_DATABASE_URL: oracle+oracledb://cognic:cognic_dev_only@localhost:1521/?service_name=XEPDB1
          COGNIC_DATABASE_URL_ORACLE_TEST: oracle+oracledb://cognic:cognic_dev_only@localhost:1521/?service_name=XEPDB1
          COGNIC_RUNTIME_DATABASE_URL_ORACLE_TEST: oracle+oracledb://agentos_runtime:runtime_dev_only@localhost:1521/?service_name=XEPDB1
        run: |
          uv run pytest -m oracle -v \
            tests/integration/db/test_runtime_role_is_append_only.py \
            tests/integration/db/test_concurrent_append.py \
            tests/integration/db/test_gateway_call_ledger.py \
            tests/integration/db/test_sprint_2_5_chain_integration.py

      - name: Run @pytest.mark.oracle tests (alembic round-trip last)
        env:
          COGNIC_RUN_ORACLE_INTEGRATION: "1"
          COGNIC_DB_DRIVER: oracle
          COGNIC_DATABASE_URL: oracle+oracledb://cognic:cognic_dev_only@localhost:1521/?service_name=XEPDB1
          COGNIC_DATABASE_URL_ORACLE_TEST: oracle+oracledb://cognic:cognic_dev_only@localhost:1521/?service_name=XEPDB1
        run: |
          uv run pytest -m oracle -v \
            tests/integration/db/test_alembic_migrations.py

      - name: Tear down overlay
        if: always()
        run: |
          docker compose -f infra/dev/docker-compose.yml \
                         -f infra/dev/docker-compose.oracle.yml \
                         down -v

  postgres-integration:
    # Sprint 2: live Postgres compose service + pytest -m postgres.
    # Runs on PR + main; failure blocks merge. Default `lint + test`
    # job runs all non-marked tests; the @pytest.mark.postgres tests
    # self-skip via `skipif(not COGNIC_RUN_POSTGRES_INTEGRATION)` —
    # this job is the only place those tests execute.
    #
    # Mirrors the `oracle-integration` shape. Postgres is much faster
    # to start than Oracle XE (~5s vs 3-5min), so the timeout is
    # tighter.
    name: postgres integration (live PG compose service)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.29"
          enable-cache: true

      - name: Read .python-version
        id: python-version
        run: echo "version=$(cat .python-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: uv sync (frozen + all extras)
        run: uv sync --frozen --all-extras

      - name: Bring up Postgres compose service
        run: |
          docker compose -f infra/dev/docker-compose.yml up -d postgres

      - name: Wait for Postgres healthy
        run: |
          set -euo pipefail
          # pg_isready is the bundled health probe; the compose
          # healthcheck retries up to 10x at 5s = 50s max. We poll
          # the same way for log-friendly output.
          for i in $(seq 1 24); do
            status=$(docker inspect cognic-agentos-postgres --format='{{.State.Health.Status}}')
            echo "[${i}/24] postgres health: ${status}"
            if [ "${status}" = "healthy" ]; then exit 0; fi
            sleep 5
          done
          echo "::error::Postgres did not reach healthy state in 2 minutes"
          docker compose -f infra/dev/docker-compose.yml logs postgres
          exit 1

      - name: Apply governance migrations + provision runtime role
        # Sprint 2 Task 12: the runtime-role canary
        # (test_runtime_role_is_append_only.py) needs a non-superuser
        # DSN with the operator-runbook GRANTs already applied. We do
        # both setup steps inline here so the canary can prove the
        # GRANT shape works against the same migration-shaped tables a
        # bank deploys.
        env:
          PGPASSWORD: cognic_dev_only
          COGNIC_DATABASE_URL: postgresql+asyncpg://cognic:cognic_dev_only@localhost:5432/cognic_agentos
        run: |
          set -euo pipefail
          # 1. Apply the governance migration as the superuser (cognic
          #    owns the database in compose).
          uv run alembic upgrade head
          # 2. Provision agentos_runtime + apply the operator-runbook
          #    GRANTs. Mirror docs/operator-runbooks/governance-tables-grants.md
          #    Step 2 + Step 3 verbatim — if this drifts from the
          #    runbook, the canary stops being a proof of the runbook.
          psql -h localhost -U cognic -d cognic_agentos -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE agentos_runtime LOGIN PASSWORD 'runtime_dev_only';
          GRANT INSERT, SELECT          ON audit_event             TO agentos_runtime;
          GRANT INSERT, SELECT          ON decision_history        TO agentos_runtime;
          GRANT INSERT, SELECT, UPDATE  ON governance_chain_heads  TO agentos_runtime;
          SQL

      - name: Run @pytest.mark.postgres tests (canary + concurrent first)
        # Run the runtime-role canary + concurrent-append tests BEFORE
        # the alembic round-trip — the round-trip drops + recreates the
        # tables, which discards the GRANTs. If we ran the canary after,
        # it would fail with "table or view does not exist" / "permission
        # denied for SCHEMA public" / similar, since the recreated
        # tables would have no grants. Split-invocation guarantees the
        # canary tests run against the same physical tables the GRANTs
        # were applied to.
        env:
          COGNIC_RUN_POSTGRES_INTEGRATION: "1"
          COGNIC_DB_DRIVER: postgres
          COGNIC_DATABASE_URL: postgresql+asyncpg://cognic:cognic_dev_only@localhost:5432/cognic_agentos
          COGNIC_DATABASE_URL_POSTGRES_TEST: postgresql+asyncpg://cognic:cognic_dev_only@localhost:5432/cognic_agentos
          COGNIC_RUNTIME_DATABASE_URL_POSTGRES_TEST: postgresql+asyncpg://agentos_runtime:runtime_dev_only@localhost:5432/cognic_agentos
        run: |
          uv run pytest -m postgres -v \
            tests/integration/db/test_runtime_role_is_append_only.py \
            tests/integration/db/test_concurrent_append.py \
            tests/integration/db/test_gateway_call_ledger.py \
            tests/integration/db/test_sprint_2_5_chain_integration.py

      - name: Run @pytest.mark.postgres tests (alembic round-trip last)
        # Alembic round-trip drops + recreates tables; ordering here
        # ensures the GRANTs the canary depends on aren't disturbed
        # before the canary asserts on them.
        env:
          COGNIC_RUN_POSTGRES_INTEGRATION: "1"
          COGNIC_DB_DRIVER: postgres
          COGNIC_DATABASE_URL: postgresql+asyncpg://cognic:cognic_dev_only@localhost:5432/cognic_agentos
          COGNIC_DATABASE_URL_POSTGRES_TEST: postgresql+asyncpg://cognic:cognic_dev_only@localhost:5432/cognic_agentos
        run: |
          uv run pytest -m postgres -v \
            tests/integration/db/test_alembic_migrations.py

      - name: Tear down compose service
        if: always()
        run: |
          docker compose -f infra/dev/docker-compose.yml down -v
