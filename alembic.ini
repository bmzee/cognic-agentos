# Cognic AgentOS — Alembic baseline (Sprint 2).
#
# Operator usage (production migrations are an operator job per the
# Sprint-2 doctrine amendment in PR #5):
#
#     export COGNIC_DATABASE_URL=postgresql+asyncpg://cognic:****@db:5432/cognic
#     uv run alembic upgrade head        # run all pending migrations
#     uv run alembic current             # show the chain head
#     uv run alembic history             # show the migration list
#
# The lifespan does NOT auto-invoke migrations — sqlalchemy.url here
# is intentionally NOT set; env.py reads COGNIC_DATABASE_URL from
# core.config.Settings at runtime so a misconfigured operator gets a
# loud startup failure rather than a silent default.

[alembic]
script_location = src/cognic_agentos/db/migrations

# Migration filenames: YYYYMMDD_HHMM_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Honour the operator's terminal locale; no path-truncation.
truncate_slug_length = 64

# Logging — minimal; alembic emits its own structured lines.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
