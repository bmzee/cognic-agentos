apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentos.fullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agentos.fullname" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        {{- with .Values.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: agentos
          image: {{ include "agentos.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "agentos.fullname" . }}-config
          env:
            - name: COGNIC_PORT
              value: {{ .Values.service.port | quote }}
            - name: COGNIC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: COGNIC_DATABASE_URL
            - name: COGNIC_VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: COGNIC_VAULT_TOKEN
          startupProbe:
            httpGet:
              path: {{ .Values.apiPrefix }}/healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: {{ .Values.apiPrefix }}/healthz
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.apiPrefix }}/readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: litellm-config
              mountPath: /app/infra/litellm
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: object-store
              mountPath: /var/lib/cognic-agentos/object-store
            - name: model-artifacts
              mountPath: /var/lib/cognic/model-artifacts
      volumes:
        - name: litellm-config
          configMap:
            name: {{ include "agentos.litellmConfigMapName" . }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpSizeLimit }}
        - name: object-store
          emptyDir:
            sizeLimit: {{ .Values.objectStore.sizeLimit }}
        - name: model-artifacts
          emptyDir:
            sizeLimit: {{ .Values.modelArtifacts.sizeLimit }}
