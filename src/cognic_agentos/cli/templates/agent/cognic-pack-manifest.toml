# Cognic AgentOS pack manifest — Wave-1 schema.

[pack]
pack_id = "{{ pack_id }}"
schema_version = 1
kind = "{{ kind }}"

[identity]
agent_id = "AUTHOR-FILL: stable identifier (e.g., did:web:example.com:agents:{{ pack_name }})"
display_name = "AUTHOR-FILL: human-readable name shown in registries"
provider_organization = "AUTHOR-FILL: your organization"
provider_url = "AUTHOR-FILL: https://your-org.example.com"
agent_card_url = "AUTHOR-FILL: https://your-org.example.com/agents/{{ pack_name }}/card.json"
agent_card_jws_path = "agent_cards/agent-card.jws"

[a2a]
# Wave-1 A2A capabilities. Push notifications and other Wave-2 features
# trip refusals from the A2A validator (T8). Field names match the
# runtime reader at protocol/a2a_capability_negotiation.read_pack_capabilities;
# changing them here without updating the runtime/validator alignment
# would silently bypass the build-time gate (R23 P2 #2).
capabilities_supported = []
streaming = false
push_notification_config = false
extended_agent_card = false
artifacts_supported = false

[data_governance]
# ADR-017 contract — vocabulary values are closed-enum literals
# defined at cognic_agentos.cli._governance_vocab.
data_classes = ["AUTHOR-FILL: e.g., public | internal | customer_pii | payment_data | credentials | regulator_communication | audit_trail | model_inputs | model_outputs"]
purpose = "AUTHOR-FILL: e.g., transaction_processing | regulatory_reporting | fraud_detection | customer_support | audit_evidence | operational_telemetry"
retention_policy = "AUTHOR-FILL: e.g., none | session_only | task_only | purpose_window | regulator_floor | indefinite_with_legal_basis"
# retention_max_window = 90  # AUTHOR-FILL: uncomment + set when policy != "none"
egress_allow_list = []  # AUTHOR-FILL

[risk_tier]
tier = "AUTHOR-FILL: low | medium | high | restricted"

[supply_chain]
attestation_paths = [
    "attestations/cosign.sig",
    "attestations/sbom.cdx.json",
]
