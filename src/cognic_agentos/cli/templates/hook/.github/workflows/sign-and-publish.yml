# Reference workflow — AUTHOR-FILL: review + customize.
# Sprint-7A2 hook-pack lifecycle (sign-before-validate per the
# static-only-committed-state doctrine).

name: sign-and-publish

on:
  push:
    branches: [main]

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "cognic-agentos @ git+https://github.com/bmzee/cognic-agentos@v0.0.2"
      - run: python -m build --wheel
      - run: agentos sign --bundle .
      - run: agentos validate .
      - run: agentos verify .
      # AUTHOR-FILL: add a publishing step.
