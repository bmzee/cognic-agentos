# Cognic AgentOS pack manifest — Wave-1 schema.
#
# Every "AUTHOR-FILL:" placeholder triggers a refusal from
# `agentos validate` until you replace it with a real value.
# Run `agentos validate .` after each round of edits to surface
# remaining gaps.

[pack]
pack_id = "{{ pack_id }}"
schema_version = 1
kind = "{{ kind }}"

[identity]
# AGNTCY/OASF identity matrix. Every field below is mandatory per
# Sprint-7A T7 (identity validator). The agent_card_jws_path is the
# pack-relative path the JWS verifier reads at admission time.
agent_id = "AUTHOR-FILL: stable identifier (e.g., did:web:example.com:tools:{{ pack_name }})"
display_name = "AUTHOR-FILL: human-readable name shown in registries"
provider_organization = "AUTHOR-FILL: your organization"
provider_url = "AUTHOR-FILL: https://your-org.example.com"
agent_card_url = "AUTHOR-FILL: https://your-org.example.com/tools/{{ pack_name }}/card.json"
agent_card_jws_path = "agent_cards/agent-card.jws"  # AUTHOR-FILL if your pack ships JWS-signed cards

# OASF capability set — optional Wave-1 (warning, NOT refusal):
# capability_set = ["AUTHOR-FILL: e.g., kyc.v1, retrieval.v1"]

[mcp]
# Wave-1 MCP capabilities. Caching + elicitation_form on restricted
# data classes trip refusals from the MCP validator (T9).
caching = false
elicitation_form = false

[data_governance]
# ADR-017 contract. Every field below is enforced by the
# data-governance validator (T10) + the runtime DLP path.
data_classes = ["AUTHOR-FILL: e.g., public, internal, confidential, restricted"]
purpose = "AUTHOR-FILL: business purpose this {{ kind }} serves"
retention_days = 0  # AUTHOR-FILL: e.g., 30, 90, 365
egress_allowlist = []  # AUTHOR-FILL: e.g., ["api.example.com"]

[risk_tier]
# ADR-014 risk tier. Must be consistent with the declared
# data_classes (e.g., "restricted" data class with tier="low" is
# refused). One of: low | medium | high | restricted.
tier = "AUTHOR-FILL: low | medium | high | restricted"

[supply_chain]
# ADR-016 attestation paths. Each path is checked at validate time;
# missing files trip supply_chain_attestation_path_unresolvable.
# Run `agentos sign --bundle .` to populate attestations/.
attestation_paths = [
    "attestations/cosign.sig",
    "attestations/sbom.cdx.json",
]
