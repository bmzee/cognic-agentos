---
# Source: agentos/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rel-agentos
  labels:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/instance: rel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: cognic-agentos
    helm.sh/chart: agentos-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentos
      app.kubernetes.io/instance: rel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentos
        app.kubernetes.io/instance: rel
    spec:
      serviceAccountName: rel-agentos
      securityContext:
        runAsNonRoot: true
      containers:
        - name: agentos
          image: "registry.example.com/cognic-agentos:0.1.0-snapshot"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: rel-agentos-config
          env:
            - name: COGNIC_PORT
              value: "8000"
            - name: COGNIC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rel-agentos-secrets
                  key: COGNIC_DATABASE_URL
            - name: COGNIC_VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rel-agentos-secrets
                  key: COGNIC_VAULT_TOKEN
          startupProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: litellm-config
              mountPath: /app/infra/litellm
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: object-store
              mountPath: /var/lib/cognic-agentos/object-store
            - name: model-artifacts
              mountPath: /var/lib/cognic/model-artifacts
      volumes:
        - name: litellm-config
          configMap:
            name: rel-agentos-litellm
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: object-store
          emptyDir:
            sizeLimit: 5Gi
        - name: model-artifacts
          emptyDir:
            sizeLimit: 5Gi

---
# Source: agentos/templates/externalsecret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rel-agentos
  labels:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/instance: rel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: cognic-agentos
    helm.sh/chart: agentos-0.1.0
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: agentos-secret-store
    kind: SecretStore
  target:
    name: rel-agentos-secrets
    creationPolicy: Owner
  data:
    - secretKey: COGNIC_DATABASE_URL
      remoteRef:
        key: agentos/database-url
    - secretKey: COGNIC_VAULT_TOKEN
      remoteRef:
        key: agentos/vault-token
---
# Source: agentos/templates/migration-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: rel-agentos-migrate
  labels:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/instance: rel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: cognic-agentos
    helm.sh/chart: agentos-0.1.0
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentos
        app.kubernetes.io/instance: rel
    spec:
      restartPolicy: Never
      serviceAccountName: rel-agentos
      securityContext:
        runAsNonRoot: true
      containers:
        - name: migrate
          image: "registry.example.com/cognic-agentos:0.1.0-snapshot"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              if [ -z "${COGNIC_DATABASE_URL:-}" ]; then
                echo "FATAL: COGNIC_DATABASE_URL is unset — refusing to run migrations" >&2
                exit 1
              fi
              exec alembic upgrade head
          # Gap 6 (Proof 1b-1): inherit the chart ConfigMap so migrations see the same non-secret
          # COGNIC_* config as the Deployment (else strict-profile guards refuse get_settings()).
          envFrom:
            - configMapRef:
                name: rel-agentos-config
          env:
            - name: COGNIC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rel-agentos-secrets
                  key: COGNIC_DATABASE_URL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
