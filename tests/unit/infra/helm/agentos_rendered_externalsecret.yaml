apiVersion: v1
kind: ServiceAccount
metadata:
  name: rel-agentos
  labels:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/instance: rel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: cognic-agentos
    helm.sh/chart: agentos-0.1.0
automountServiceAccountToken: false

---
# Source: agentos/templates/configmap-litellm.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: rel-agentos-litellm
  labels:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/instance: rel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: cognic-agentos
    helm.sh/chart: agentos-0.1.0
data:
  config.yaml: |
    model_list:
      - model_name: cognic-tier1-dev
        litellm_params:
          model: ollama/qwen3:8b
          api_base: ${OLLAMA_BASE_URL:-http://ollama:11434}
      - model_name: cognic-tier2-dev
        litellm_params:
          model: ollama/qwen3:32b
          api_base: ${OLLAMA_BASE_URL:-http://ollama:11434}
    litellm_settings:
      drop_params: true
    general_settings:
      master_key: ${LITELLM_MASTER_KEY}

---
# Source: agentos/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: rel-agentos-config
  labels:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/instance: rel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: cognic-agentos
    helm.sh/chart: agentos-0.1.0
data:
  COGNIC_RUNTIME_PROFILE: "prod"
  COGNIC_API_PREFIX: "/api/v1"
